
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.app{max-width:680px;padding:1.5rem 0}
h2{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:1.5rem}
.form-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem}
.field{margin-bottom:1rem}
.field label{display:block;font-size:13px;color:var(--color-text-secondary);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;font-size:14px}
.field textarea{height:60px;resize:none;padding:8px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-family:var(--font-sans)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.submit-btn{width:100%;padding:10px;font-size:15px;font-weight:500;background:var(--color-text-primary);color:var(--color-background-primary);border:none;border-radius:var(--border-radius-md);cursor:pointer;margin-top:4px;transition:opacity 0.15s}
.submit-btn:hover{opacity:0.85}
.submit-btn:disabled{opacity:0.4;cursor:not-allowed}
.loading{text-align:center;padding:2rem;color:var(--color-text-secondary);font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--color-border-secondary);border-top-color:var(--color-text-primary);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.recipes-section{margin-top:1.5rem}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.tab-bar{display:flex;gap:4px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:3px}
.tab{padding:5px 14px;font-size:13px;border:none;background:transparent;border-radius:6px;cursor:pointer;color:var(--color-text-secondary);transition:all 0.15s}
.tab.active{background:var(--color-background-primary);color:var(--color-text-primary);font-weight:500;border:0.5px solid var(--color-border-tertiary)}
.recipe-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem}
.recipe-header{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:1rem}
.recipe-title{font-size:16px;font-weight:500;color:var(--color-text-primary)}
.recipe-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.badge{font-size:11px;padding:3px 8px;border-radius:var(--border-radius-md);white-space:nowrap}
.badge-time{background:#E1F5EE;color:#0F6E56}
.badge-cal{background:#FAEEDA;color:#854F0B}
.badge-diff{background:#EEEDFE;color:#534AB7}
.fav-btn{flex-shrink:0;background:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:5px 10px;cursor:pointer;font-size:14px;transition:all 0.15s;color:var(--color-text-secondary)}
.fav-btn.active{border-color:#E24B4A;color:#E24B4A;background:#FCEBEB}
.recipe-section-title{font-size:13px;font-weight:500;color:var(--color-text-secondary);margin:12px 0 6px;text-transform:none}
.ingredients-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.ingredient-item{font-size:13px;color:var(--color-text-primary);padding:4px 8px;background:var(--color-background-secondary);border-radius:6px}
.steps-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.step-item{display:flex;gap:10px;font-size:13px;line-height:1.6}
.step-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--color-text-primary);color:var(--color-background-primary);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;margin-top:2px}
.step-text{color:var(--color-text-primary)}
.empty-fav{text-align:center;padding:3rem;color:var(--color-text-tertiary);font-size:14px}
.error-box{background:#FCEBEB;border:0.5px solid #F7C1C1;border-radius:var(--border-radius-md);padding:1rem;color:#A32D2D;font-size:13px;margin-top:1rem}
</style>

<h2 class="sr-only">冷蔵庫レシピ提案AI</h2>
<div class="app">
  <h2>冷蔵庫レシピ提案AI</h2>

  <div class="form-card">
    <div class="field">
      <label>食材（カンマ区切りで入力）</label>
      <textarea id="ingredients" placeholder="例：鶏肉, 玉ねぎ, にんじん, じゃがいも, 醤油"></textarea>
    </div>
    <div class="row">
      <div class="field">
        <label>調理時間</label>
        <select id="time">
          <option value="15分">15分以内</option>
          <option value="30分" selected>30分以内</option>
          <option value="1時間">1時間以内</option>
        </select>
      </div>
      <div class="field">
        <label>難易度</label>
        <select id="difficulty">
          <option value="簡単">簡単</option>
          <option value="普通" selected>普通</option>
          <option value="本格的">本格的</option>
        </select>
      </div>
    </div>
    <button class="submit-btn" id="generateBtn" onclick="generateRecipes()">レシピを提案する</button>
  </div>

  <div id="loadingArea" style="display:none" class="loading">
    <span class="spinner"></span>AIがレシピを考えています…
  </div>
  <div id="errorArea" style="display:none" class="error-box"></div>

  <div id="resultsArea" class="recipes-section" style="display:none">
    <div class="section-header">
      <span style="font-size:14px;font-weight:500;color:var(--color-text-primary)">提案レシピ</span>
      <div class="tab-bar">
        <button class="tab active" onclick="switchTab('results')">今回の提案</button>
        <button class="tab" onclick="switchTab('favorites')" id="favTab">お気に入り (<span id="favCount">0</span>)</button>
      </div>
    </div>
    <div id="recipesContainer"></div>
    <div id="favoritesContainer" style="display:none"></div>
  </div>
</div>

<script>
let recipes=[];
let favorites=JSON.parse(localStorage.getItem('rf_favorites')||'[]');
let activeTab='results';

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('recipesContainer').style.display=tab==='results'?'block':'none';
  document.getElementById('favoritesContainer').style.display=tab==='favorites'?'block':'none';
  if(tab==='favorites')renderFavorites();
}

function toggleFavorite(idx,isFav){
  const recipe=isFav?favorites[idx]:recipes[idx];
  if(isFav){
    favorites.splice(idx,1);
  } else {
    const already=favorites.some(f=>f.name===recipe.name);
    if(!already)favorites.push(recipe);
  }
  localStorage.setItem('rf_favorites',JSON.stringify(favorites));
  updateFavCount();
  if(isFav)renderFavorites();
  else renderRecipes();
}

function updateFavCount(){
  document.getElementById('favCount').textContent=favorites.length;
}

function renderCard(recipe,idx,isFav){
  const isSaved=isFav||favorites.some(f=>f.name===recipe.name);
  const ings=(recipe.ingredients||[]).map(i=>`<div class="ingredient-item">${i}</div>`).join('');
  const steps=(recipe.steps||[]).map((s,i)=>`<li class="step-item"><span class="step-num">${i+1}</span><span class="step-text">${s}</span></li>`).join('');
  return `<div class="recipe-card">
    <div class="recipe-header">
      <div>
        <div class="recipe-title">${recipe.name||'レシピ'}</div>
        <div class="recipe-meta">
          <span class="badge badge-time">${recipe.time||''}</span>
          <span class="badge badge-cal">${recipe.calories||''}</span>
          <span class="badge badge-diff">${recipe.difficulty||''}</span>
        </div>
      </div>
      <button class="fav-btn ${isSaved?'active':''}" onclick="toggleFavorite(${idx},${isFav})">
        ${isSaved?'♥ 保存済み':'♡ お気に入り'}
      </button>
    </div>
    <div class="recipe-section-title">材料</div>
    <div class="ingredients-grid">${ings}</div>
    <div class="recipe-section-title">作り方</div>
    <ol class="steps-list">${steps}</ol>
  </div>`;
}

function renderRecipes(){
  document.getElementById('recipesContainer').innerHTML=recipes.map((r,i)=>renderCard(r,i,false)).join('');
}

function renderFavorites(){
  const c=document.getElementById('favoritesContainer');
  if(favorites.length===0){
    c.innerHTML='<div class="empty-fav">お気に入りのレシピはまだありません。<br>レシピカードの ♡ ボタンで保存できます。</div>';
  } else {
    c.innerHTML=favorites.map((r,i)=>renderCard(r,i,true)).join('');
  }
}

async function generateRecipes(){
  const ing=document.getElementById('ingredients').value.trim();
  if(!ing){alert('食材を入力してください');return;}
  const time=document.getElementById('time').value;
  const diff=document.getElementById('difficulty').value;

  document.getElementById('generateBtn').disabled=true;
  document.getElementById('loadingArea').style.display='block';
  document.getElementById('errorArea').style.display='none';
  document.getElementById('resultsArea').style.display='none';

  const prompt=`あなたは料理の専門家です。以下の食材と条件でレシピを3案考えてください。

食材：${ing}
調理時間：${time}以内
難易度：${diff}

必ず以下のJSON形式のみで回答してください。前置きや説明は不要です。
[
  {
    "name": "料理名",
    "time": "調理時間（例：約20分）",
    "calories": "推定カロリー（例：約350kcal）",
    "difficulty": "${diff}",
    "ingredients": ["材料1（分量）", "材料2（分量）"],
    "steps": ["手順1の説明", "手順2の説明"]
  }
]`;

  try {
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.error?.message||'APIエラー');

    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const jsonMatch=text.match(/\[[\s\S]*\]/);
    if(!jsonMatch)throw new Error('レスポンスの解析に失敗しました');
    recipes=JSON.parse(jsonMatch[0]);

    renderRecipes();
    updateFavCount();
    document.getElementById('resultsArea').style.display='block';
    if(activeTab==='favorites'){
      document.getElementById('recipesContainer').style.display='none';
      document.getElementById('favoritesContainer').style.display='block';
    }
  } catch(e){
    document.getElementById('errorArea').textContent='エラー：'+e.message;
    document.getElementById('errorArea').style.display='block';
  } finally {
    document.getElementById('loadingArea').style.display='none';
    document.getElementById('generateBtn').disabled=false;
  }
}
updateFavCount();
</script>
